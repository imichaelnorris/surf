<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>surf — ski prototype</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #cfe8f5; }
      #app { width: 100vw; height: 100vh; display: block; touch-action: none; }
      #hud {
        position: fixed; top: 12px; left: 12px;
        font: 600 14px/1.4 ui-monospace, Menlo, monospace;
        color: #1b3a4b; text-shadow: 0 1px 0 rgba(255,255,255,0.5);
        pointer-events: none; user-select: none;
      }
      #hud .big { font-size: 28px; }
      #help {
        position: fixed; bottom: 12px; left: 12px;
        font: 500 12px/1.5 ui-monospace, Menlo, monospace;
        color: #2b5263; opacity: 0.8; pointer-events: none; user-select: none;
      }
      /* Game-over overlay — translucent so the wiped-out slope shows through. */
      #gameover {
        position: fixed; inset: 0; display: none;
        align-items: center; justify-content: center;
        background: rgba(24, 48, 64, 0.42);
        backdrop-filter: blur(2px);
        font-family: ui-monospace, Menlo, monospace; color: #fff;
        z-index: 20;
      }
      #gameover.show { display: flex; }
      #gameover .panel {
        text-align: center; padding: 28px 40px; border-radius: 16px;
        background: rgba(16, 32, 44, 0.55);
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      }
      #gameover .title { font-size: 30px; font-weight: 700; margin-bottom: 6px; }
      #gameover .score { font-size: 18px; opacity: 0.9; margin-bottom: 20px; }
      #gameover button {
        font: 700 18px ui-monospace, Menlo, monospace;
        color: #0e2230; background: #ffffff; border: none;
        padding: 14px 34px; border-radius: 999px; cursor: pointer;
        transition: transform 0.08s ease;
      }
      #gameover button:hover { transform: scale(1.05); }
      #gameover button:active { transform: scale(0.97); }
      #gameover .hint { margin-top: 14px; font-size: 12px; opacity: 0.7; }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="hud">
      <div class="big" id="distance">0 m</div>
      <div id="speed">0.0 m/s</div>
      <div id="status"></div>
    </div>
    <div id="help">← → / A D steer · ↓ / S brake · Space / W jump · touch: drag to steer, down to brake, tap to jump</div>
    <div id="gameover">
      <div class="panel">
        <div class="title">💥 Wiped out</div>
        <div class="score" id="final">0 m</div>
        <button id="replay">↻ Replay</button>
        <div class="hint">press Enter / R</div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
